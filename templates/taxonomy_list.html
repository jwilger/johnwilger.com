{% extends "base.html" %}
{% import "macros.html" as macros %}

{% block title %}Tags — {{ config.title }}{% endblock title %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 0 auto;">
  <header class="page-header">
    <h1>Tags</h1>
    <p>All topics covered on the blog.</p>
  </header>

  <div class="tags-list" style="justify-content: center;">
    {% for term in terms %}
    <a href="{{ term.permalink | safe }}" class="tag">{{ term.name }} ({{ term.pages | length }})</a>
    {% endfor %}
  </div>
</div>
{% endblock content %}
